<header class="header">
  <!-- Logo -->
  <div class="logo">
    <a class="tech-link" routerLink="">
      <span>⚙️</span>
    </a>
    <a class="tech-link" routerLink="/course">
      <span>DevTutorials</span>
    </a>
  </div>

  <!-- Tech Nav Icons -->
  <nav class="tech-nav">
    @if (subjects$ | async; as subjects) {
    @for (subject of subjects; track subject.id) {
    <a class="tech-link" [routerLink]="['/course', subject.id]">
      {{ subject.name }}
    </a>
    }
    }
    <a class="tech-link" routerLink="/course/lesson/create">
      <span>Share Knowledge</span>
    </a>
  </nav>

  <!-- Auth Buttons -->
  <div class="auth-buttons">
    <a routerLink="/signin" class="auth-button">Sign In</a>
    <a routerLink="/signup" class="auth-button">Sign Up</a>
  </div>
</header>
