<div class="home-lesson-container">
  @if (subject$ | async; as subject) {
  <div class="subject-intro">
    <!-- Subject Header -->
    <div class="subject-header">
      <div class="subject-icon">📚</div>
      <h1>{{ subject.name }}</h1>
    </div>

    <!-- Subject Description -->
    <div class="subject-body">
      <h2>About This Subject</h2>
      <p>{{ subject.description }}</p>
    </div>

    <!-- Call to Action -->
    <div class="subject-footer">
      <button class="btn btn-start" (click)="startLearning()">
        Start Learning →
      </button>
    </div>
  </div>
  }
</div>
