<div class="blog-container">
  <header class="blog-header">
    <div>
      <h2>Educational Blog</h2>
      <p class="subtitle">Read and share knowledge on educational topics.</p>
    </div>
    <button class="btn btn-primary" (click)="startCreate()">Write a Blog</button>
  </header>

  @if (error) {
    <div class="error-banner">{{ error }}</div>
  }

  @if (loading) {
    <div class="empty-state"><p>Loading posts…</p></div>
  }

  <div class="blog-grid">
    @for (post of posts; track post.id) {
      <app-blog-card [post]="post" (open)="openPost($event)" />
    }
  </div>

  @if (!posts.length && !loading) {
    <div class="empty-state">
      <p>No blogs yet. Be the first to share your knowledge!</p>
    </div>
  }
</div>
