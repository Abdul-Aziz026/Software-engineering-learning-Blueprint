<div class="reset-page">
  <div class="reset-card">
    <h1 class="reset-title">Reset your password</h1>

    @if (successMessage) {
      <p class="info-message">{{ successMessage }}</p>
      <button type="button" class="submit-btn" (click)="goHome()">Go to home & sign in</button>
    } @else {
      <p class="reset-subtitle">Choose a new password for your account.</p>

      <form #resetForm="ngForm" (ngSubmit)="submit(resetForm)" novalidate>
        <label class="field">
          <span>New password</span>
          <input type="password"
                 name="newPassword"
                 [(ngModel)]="newPassword"
                 required
                 minlength="3"
                 autocomplete="new-password"
                 placeholder="••••••••"
                 [disabled]="!token" />
        </label>

        <label class="field">
          <span>Confirm password</span>
          <input type="password"
                 name="confirmPassword"
                 [(ngModel)]="confirmPassword"
                 required
                 minlength="3"
                 autocomplete="new-password"
                 placeholder="••••••••"
                 [disabled]="!token" />
        </label>

        <p class="hint">
          Min 3 chars, must include a letter, a number, and a special character.
        </p>

        @if (errorMessage) {
          <p class="error-message">{{ errorMessage }}</p>
        }

        <button type="submit"
                class="submit-btn"
                [disabled]="resetForm.invalid || isSubmitting || !token">
          @if (isSubmitting) {
            <span>Please wait…</span>
          } @else {
            <span>Reset password</span>
          }
        </button>
      </form>

      <p class="switch-line">
        <a class="link-btn" routerLink="/">Back to home</a>
      </p>
    }
  </div>
</div>
